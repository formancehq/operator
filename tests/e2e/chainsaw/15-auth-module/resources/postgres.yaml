apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chainsaw-auth
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chainsaw-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: formance
            - name: POSTGRES_PASSWORD
              value: formance
            - name: POSTGRES_DB
              value: postgres
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - formance
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 1
