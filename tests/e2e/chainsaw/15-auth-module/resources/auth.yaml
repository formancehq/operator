apiVersion: formance.com/v1beta1
kind: Auth
metadata:
  name: auth
spec:
  stack: chainsaw-auth
  signingKeyFromSecret:
    name: chainsaw-auth-signing-key
    key: signing-key
  delegatedOIDCServer:
    issuer: https://delegated.chainsaw.local
    clientID: delegated-client
    clientSecretFromSecret:
      name: chainsaw-auth-signing-key
      key: delegated-secret
