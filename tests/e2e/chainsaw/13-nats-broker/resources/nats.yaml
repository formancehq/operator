apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: chainsaw-nats
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: chainsaw-nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -js
            - -m
            - "8222"
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 2
            periodSeconds: 2
