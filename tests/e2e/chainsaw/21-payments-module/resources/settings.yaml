apiVersion: formance.com/v1beta1
kind: Settings
metadata:
  name: chainsaw-payments-postgres-uri
spec:
  stacks:
    - chainsaw-payments
  key: postgres.payments.uri
  value: postgresql://postgres.chainsaw-payments.svc.cluster.local:5432?secret=postgres&disableSSLMode=true
---
