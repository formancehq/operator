apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: chainsaw-networkpolicies
  ownerReferences:
    - apiVersion: formance.com/v1beta1
      kind: Stack
      name: chainsaw-networkpolicies
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: chainsaw-networkpolicies
  ownerReferences:
    - apiVersion: formance.com/v1beta1
      kind: Stack
      name: chainsaw-networkpolicies
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway
  ingress:
    - {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: chainsaw-networkpolicies
  ownerReferences:
    - apiVersion: formance.com/v1beta1
      kind: Stack
      name: chainsaw-networkpolicies
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
  policyTypes:
    - Ingress
