apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: chainsaw-application-settings
  annotations:
    chainsaw-service: "yes"
  ownerReferences:
    - apiVersion: formance.com/v1beta1
      kind: Gateway
      name: gateway
spec:
  trafficDistribution: PreferClose
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway
  namespace: chainsaw-application-settings
  ownerReferences:
    - apiVersion: formance.com/v1beta1
      kind: Gateway
      name: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
